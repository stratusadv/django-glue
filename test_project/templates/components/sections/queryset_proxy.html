<div x-show="activeTab === 'queryset'" x-data="{
    tasks: Glue.tasks,
    search: '',
    get searchedTasks() {
        if (this.search) {
            return this.tasks.filter({'description__icontains': this.search})
        } else {
            return this.tasks.all()
        }
    }
}">
    <h5 class="card-title mb-4">Glue QuerySet Proxy</h5>
    <p class="text-muted mb-4">Browse and edit multiple tasks with live filtering.</p>

    <div class="mb-4">
        <div class="input-group">
            <span class="input-group-text bg-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
            </span>
            <input
                type="text"
                class="form-control"
                placeholder="Search tasks by description..."
                x-model.debounce="search">
        </div>
    </div>

    <div class="row g-3">
        <template x-for="task in searchedTasks" :key="task.id">
            {% include "components/task_card.html" %}
        </template>

        <div x-show="searchedTasks.length === 0" class="col-12">
            <div class="alert alert-info mb-0">
                No tasks found matching your search.
            </div>
        </div>
    </div>
</div>
