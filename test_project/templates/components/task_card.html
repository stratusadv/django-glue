<div class="col-12">
    <div class="card">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">ID</label>
                    <input type="text" class="form-control bg-light" x-model="task.id" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Title</label>
                    <input type="text" class="form-control" x-model="task.title" placeholder="Enter task title">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea class="form-control" rows="3" x-model="task.description" placeholder="Enter task description"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Done</label>
                    <select class="form-select" x-model.boolean="task.done">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Order</label>
                    <input type="number" class="form-control" x-model.number="task.order">
                </div>
                <div class="col-12">
                    <div class="d-flex gap-2">
                        <button type="button" @click="task.save()" class="btn btn-primary">
                            Save Task
                        </button>
                        <button type="button" @click="task.delete();" class="btn btn-outline-danger">
                            Delete Task
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
