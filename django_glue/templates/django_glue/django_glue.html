{% load static %}
{% csrf_token %}

{% if debug %}
    <script src="{% static 'django_glue/js/glue.min.js' %}"></script>
{% else %}
    <script src="{% static 'django_glue/js/glue.js' %}"></script>
{% endif %}
<script defer type="application/javascript">
    const glueInitParams = {
        proxyRegistryFromSession: {{ DJANGO_GLUE_SESSION_PROXY_REGISTRY|safe }},
        contextDataForProxies: {{ DJANGO_GLUE_PROXIES_CONTEXT_DATA|safe }},
        keepLiveInterval: {{ DJANGO_GLUE_KEEP_LIVE_INTERVAL_TIME_MILLISECONDS }}
    }

    Glue.init(glueInitParams)
</script>
